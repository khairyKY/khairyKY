name: Generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: khairyKY
          outputs: |
            dist/github-snake.svg?color_snake=ED6F5C&color_dots=0D0D0D&color_dot_medium=161614&color_dot_large=2A2620
            dist/github-snake-dark.svg?palette=github-dark&color_snake=ED6F5C
      - uses: actions/upload-artifact@v4
        with:
          name: snake-svg
          path: dist/
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
